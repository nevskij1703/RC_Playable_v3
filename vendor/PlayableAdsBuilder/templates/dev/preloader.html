    <style>
        #close {
            position: fixed;
            right: 12px;
            top: 12px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #000;
            z-index: 2222;
            user-select: none;
        }

        #close::after,
        #close::before {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 0;
            height: 0;
            margin-top: -5px;
            border-top: 5px solid transparent;
            border-left: 6px solid #fff;
            border-bottom: 5px solid transparent;
            content: "";
        }

        #close::before {
            margin-left: -5px;
        }

        #close::after {
            margin-left: 1px;
        }

        #close2 {
            position: fixed;
            right: 58px;
            top: 10px;
            width: 15px;
            height: 15px;
            border: 2px solid #fff;
            border-radius: 50%;
            background-color: #000;
            z-index: 2222;
            user-select: none;
            display: none;
        }


        @media (min-aspect-ratio: 2/1) {
            #close2 {
                display: block;
            }
        }

        @media (max-aspect-ratio: 1/2) {
            #close2 {
                top: 58px;
                right: 10px;
                display: block;
            }
        }
